baseURL: "https://martincarapia.github.io/"
languageCode: "en-us"
title: "Martin Carapia"
theme: hugo-profile

outputs:
  home:
    - "HTML"
    - "RSS"
    - "JSON"
  page:
    - "HTML"
    - "RSS"

enableRobotsTXT: true

pagination:
  pagerSize: 3

markup:
  goldmark:
    renderer:
      unsafe: true

Menus:

params:
  title: "Martin Mizner Carapia"
  description: "Martin Mizner Carapia - Software Developer Portfolio"
  favicon: "/favicon.ico"

  useBootstrapCDN: false
  mathjax: false
  animate: true

  theme:
    defaultTheme: "light"

  font:
    fontSize: 1rem
    fontWeight: 400
    lineHeight: 1.5
    textAlign: left

  navbar:
    align: ms-auto
    brandName: "Martin Mizner Carapia"
    disableSearch: false
    stickyNavBar:
      enable: true
      showOnScrollUp: true
    enableSeparator: false
    menus:
      disableAbout: false
      disableExperience: false
      disableEducation: false
      disableProjects: false
      disableAchievements: false
      disableContact: false

  # Hero
  hero:
    enable: true
    intro: "Hi, my name is"
    title: "Martin Mizner Carapia."
    subtitle: "Remote Software Engineer"
    content: "Software developer with experience in web development, automation, and testing. Proven ability to deliver scalable code, resolve bugs, and improve user experience using Python, JavaScript, SQL, and modern frameworks. Seeking remote opportunities to contribute to high-impact development teams."
    image: /images/photosofme/prophoto.jpg
    bottomImage:
      enable: true
    button:
      enable: true
      name: "Resume"
      url: "/martin-carapia-resume.pdf"
      download: true
      newPage: false
    socialLinks:
      fontAwesomeIcons:
        - icon: fab fa-github
          url: https://github.com/martincarapia
        - icon: fab fa-linkedin
          url: https://linkedin.com/in/mcarapia
        - icon: fas fa-envelope
          url: "mailto:martin.carapia@outlook.com"

  # About
  about:
    enable: true
    title: "About Me"
    image: "/images/photosofme/me.jpeg"
    content: |-
      Software developer with experience in web development, automation, and testing. Proven ability to deliver scalable code, resolve bugs, and improve user experience using Python, JavaScript, SQL, and modern frameworks. 

      Currently working as a Software Developer at Medical Informatics Engineering, focusing on healthcare software systems. Previously served as Software Engineer at Kushview, developing responsive web applications. My experience spans from robotics programming with C++ to full-stack web development with modern frameworks like Hugo and TypeScript.

      I thrive in collaborative environments, whether leading development teams in high-pressure robotics competitions or working with distributed teams to deliver features across multiple environments.
    skills:
      enable: true
      title: "Here are the technologies I work with:"
      items:
        - "Python"
        - "JavaScript"
        - "TypeScript" 
        - "C++"
        - "C"
        - "Java"
        - "SQL"
        - "Hugo"
        - "HTML/CSS"
        - "Bootstrap"
        - "MeteorJS"
        - "REST APIs"
        - "MongoDB"
        - "Linux"
        - "Git"
        - "AWS"
        - "GitHub Actions"

  # Experience
  experience:
    enable: true
    items:
      - company: "Medical Informatics Engineering"
        companyUrl: "https://mieweb.org/"
        jobs:
          - name: "Software Developer (Former Intern)"
            date: "May 2024 - Present"
            content: |
              Started as Software Development Intern and promoted to Software Developer. Focus on healthcare software systems with responsibilities spanning multiple programming languages and technologies.

              - Debug and fix software issues in C, JavaScript, and SQL
              - Create and update SQL-based reports based on client specifications  
              - Perform code reviews and contribute to weekly hotfix assessments
              - Build and maintain automated test cases to improve code reliability
              - Track and manage development tasks using internal ticketing system
              - Work within Linux environments (Fedora, RedHat, CentOS)
              - Communicate with internal teams to ensure timely resolution of issues
            info:
              content: Healthcare software development - Fort Wayne (Hybrid)
            featuredItems:
              fontAwesomeIcons:
                - icon: fa-solid fa-code
                  tooltip: C/JavaScript/SQL Development
                - icon: fa-brands fa-linux
                  tooltip: Linux Development Environment
              customIcons:
                - icon: /fav.png
                  url: "#"
                  tooltip: Current Role

      - company: "Kushview"
        companyUrl: "https://kushview.net"
        jobs:
          - name: "Software Engineer"
            date: "February 2022 - May 2024"
            content: |
              Developing and maintaining web applications with focus on performance and user experience optimization.

              - Developed and maintained responsive web applications using Hugo, JavaScript, and TypeScript
              - Collaborated with distributed teams to deliver features and fix issues across multiple environments
              - Improved user experience through performance tuning and iterative UI enhancements
              - Integrated client feedback into deployments, leading to higher satisfaction and product alignment
              - Ensured smooth CI/CD workflows and contributed to continuous product improvement
            info:
              content: Web development and performance optimization - Fort Wayne (Remote)
            featuredItems:
              fontAwesomeIcons:
                - icon: fa-brands fa-js-square
                  url: https://developer.mozilla.org/en-US/docs/Web/JavaScript
                  tooltip: JavaScript/TypeScript Development
                - icon: fa-solid fa-globe
                  tooltip: Web Development

  # Education
  education:
    enable: true
    index: false
    items:
      - title: "Associate of Science: Software Development"
        school:
          name: "Ivy Tech Community College, Fort Wayne"
          url: "https://www.ivytech.edu"
        date: "March 2023 - May 2025"
        content: |-
          Completed an Associate of Science degree in Software Development, with coursework focused on modern programming languages, software engineering principles, and industry best practices.

          Key Areas of Study:
            - Programming Fundamentals and Object-Oriented Design
            - Web Development Technologies
            - Database Design and Management
            - Software Testing and Quality Assurance
            - Version Control and Collaborative Development
        featuredLink:
          enable: false
          name: "Academic Projects"
          url: "#"
      - title: "High School Academic and Technical Honors"
        school:
          name: "R. Nelson Snider High School, Fort Wayne"
          url: "https://snider.fortwayneschools.org/"
        date: "August 2021 - May 2025"
        content: |-
          Graduated with Academic and Technical Honors, demonstrating excellence in both academic coursework and technical skills development.
          
          Achievements:
            - Academic and Technical Honors recognition
            - Strong foundation in mathematics and sciences
            - Early exposure to computer science and programming concepts

  # Achievements
  achievements:
    enable: true
    items:
      - title: Certified Associate in Python Programming (PCAP)
        content: Advanced Python certification showcasing intermediate to advanced Python programming capabilities.
        image: /images/achievements/pcap-cert.png
      - title: Certified Python Entry Level Programmer (PCEP)
        content: Foundation certification demonstrating proficiency in Python programming fundamentals.
        image: /images/achievements/pcep-cert.png
      - title: 1st Place SkillsUSA State Competition - Computer Programming
        content: Won first place in state-level SkillsUSA competition for computer programming, qualifying for national competition.
        image: /images/achievements/skillswinner.jpeg
      - title: Indiana State Championship & Rookie of The Year - FIRST Robotics
        content: Led software development team to state championship victory and was recognized as Rookie of the Year at the Indiana State Championship for FIRST Robotics competition.
        image: /images/achievements/state.JPG

  # projects
  projects:
    enable: true
    title: "Contributions"
    items:
      - title: Snider Computer Science Program Website
        content: Developed and deployed a Hugo static website for a computer science program. Wrote reusable templates and optimized for performance with modern web development practices.
        image: /images/projects/snidercs.png
        featured:
          name: Visit Site
          link: "https://snidercs.org"
        badges:
          - "Hugo"
          - "HTML/CSS"
          - "Static Site Generation"
          - "Performance Optimization"
        links:
          - icon: fa fa-external-link-alt
            url: "https://snidercs.org"

      - title: Kushview Corporate Website
        content: Hugo-based static website development for audio technology company, focusing on responsive design and performance optimization for corporate presence.
        image: /images/projects/kushview.png
        featured:
          name: View Site
          link: "https://kushview.net"
        badges:
          - "WordPress"
          - "Shop"
          - "Responsive Design"
          - "Corporate Web"
        links:
          - icon: fa fa-external-link-alt
            url: "https://kushview.net"

      - title: Ozwell - Bluehive AI Platform
        content: AI-powered web application built with Meteor framework integrated with OpenAI services, demonstrating full-stack development with modern AI integration.
        image: /images/projects/ozwell.png
        featured:
          name: View Project
          link: "https://ai.bluehive.com/"
        badges:
          - "Meteor Framework"
          - "OpenAI Integration"
          - "AI/ML"
          - "Full-Stack"
        links:
          - icon: fa fa-external-link-alt
            url: "https://ai.bluehive.com/"

  footer:
    socialNetworks:
      github: https://github.com/martincarapia
      linkedin: https://linkedin.com/in/mcarapia

  # List pages like blogs and posts
  listPages:
    disableFeaturedImage: false

  # Single pages like blog and post
  singlePages:
    socialShare: true
    readTime:
      enable: true
      content: "min read"
    scrollprogress:
      enable: true
    tags:
      openInNewTab: true

  # For translations
  terms:
    read: "Read"
    toc: "Table Of Contents"
    copyright: "All rights reserved"
    pageNotFound: "Page not found"
    emailText: "Check out this site"

  datesFormat:
    article: "Jan 2, 2006"
    articleList: "Jan 2, 2006"
    articleRecent: "Jan 2, 2006"